name: Dusk Tests

on:
  push:
  pull_request:

jobs:
  dusk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Add auth.local to hosts to senhaunica-faker works properly
        run: |
          echo "127.0.0.1 auth.local" | sudo tee -a /etc/hosts

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for MariaDB
        run: |
          until [ "$(docker inspect -f '{{.State.Health.Status}}' $(docker compose ps -q mariadb))" = "healthy" ]; do
            sleep 2
          done

      - name: Install Composer dependencies
        run: docker compose exec -T impressoras composer install --no-interaction --prefer-dist
        
      - name: Generate APP_KEY
        run: docker compose exec -T impressoras php artisan key:generate

      - name: Run migrations
        run: docker compose exec -T impressoras php artisan migrate --force

      - name: Run Dusk
        run: docker compose exec -T impressoras php artisan dusk --without-tty

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v