name: Dusk Tests

on:
  push:
  pull_request:

jobs:
  dusk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            docker compose exec -T mariadb mysqladmin ping \
              -hlocalhost \
              -uimpressoras \
              -pimpressoras \
              --silent && exit 0
            sleep 2
          done
          exit 1

      - name: Generate APP_KEY
        run: docker compose exec -T impressoras php artisan key:generate

      - name: Run migrations
        run: docker compose exec -T impressoras php artisan migrate --force

      - name: Run Dusk
        run: docker compose exec -T impressoras php artisan dusk --without-tty

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v